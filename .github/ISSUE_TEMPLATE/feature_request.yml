name: Feature request
description: Suggest a new feature or improvement
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the suggestion! Please describe your idea as concretely as you can.

  - type: textarea
    id: motivation
    attributes:
      label: Motivation / use case
      description: What problem does this solve? What would it enable?
    validations:
      required: true

  - type: textarea
    id: api
    attributes:
      label: Proposed API sketch
      description: How would you expect to use this feature? A rough code sketch is helpful.
      placeholder: |
        ```python
        bn.set_input("node", geobn.MyNewSource(...))
        ```
    validations:
      required: false

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any workarounds you've tried, or other approaches you considered.
    validations:
      required: false
